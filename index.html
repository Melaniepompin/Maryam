<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Belated Birthday Maryam ❤️</title><style>

body{
margin:0;
padding:0;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:'Courier New',monospace;
color:white;
text-align:center;
overflow-x:hidden;
}

/* Title */

h1{
margin-top:60px;
font-size:45px;
}

/* Letter Card */

.card{
width:80%;
max-width:700px;
margin:40px auto;
padding:30px;
background:rgba(255,255,255,0.15);
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
animation:openLetter 2s ease forwards;
transform:scale(0);
}

@keyframes openLetter{
to{transform:scale(1);}
}

/* Typing text */

#message{
font-size:20px;
line-height:1.8;
white-space:pre-line;
}

.cursor{
display:inline-block;
width:3px;
background:white;
margin-left:4px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

/* Floating hearts */

.heart{
position:fixed;
bottom:-20px;
color:red;
font-size:20px;
animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-100vh);opacity:0;}
}

/* Falling roses */

.rose{
position:fixed;
top:-20px;
font-size:22px;
animation:fall 8s linear infinite;
}

@keyframes fall{
0%{transform:translateY(0);}
100%{transform:translateY(110vh);}
}

/* Fireworks */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

</style></head><body><h1>💖 Happy Belated Birthday Maryam 🎂</h1><div class="card">
<div id="message"></div><span class="cursor"></span>
</div><!-- Background Music --><audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8b6f3e9f16.mp3" type="audio/mp3">
</audio><canvas id="fireworks"></canvas>

<script>

/* Typing Message */

const text = `My Dearest Maryam ❤️

Happy Belated Birthday to the most amazing girl in my life. 🎉

Even though my wishes came a little late,
my prayers for you are never late.

May Allah bless your new age with happiness,
peace, barakah and endless success. 🤲✨

You are not just special to me,
you are someone deeply important to my heart.

Your kindness, your care,
and the way you guide me and teach me about Islam
mean more to me than words can express.

I pray that Allah grants you long life,
good health and Jannah. 🌙

Thank you for being such a beautiful soul.

Happy Belated Birthday my baby Maryam 🎂❤️

With love,
Abdulkareem 💙
`;

let index=0;
function typeWriter(){
if(index < text.length){
document.getElementById("message").innerHTML += text.charAt(index);
index++;
setTimeout(typeWriter,35);
}
}
typeWriter();

/* Floating Hearts */

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(15+Math.random()*25)+"px";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);

},500);

/* Falling Roses */

setInterval(()=>{
let rose=document.createElement("div");
rose.className="rose";
rose.innerHTML="🌹";
rose.style.left=Math.random()*100+"vw";
rose.style.fontSize=(18+Math.random()*20)+"px";
document.body.appendChild(rose);

setTimeout(()=>{rose.remove()},8000);

},700);

/* Fireworks */

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function firework(){
let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<30;i++){
particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*5,
vy:(Math.random()-0.5)*5,
life:100
});
}
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle="white";
ctx.fill();

if(p.life<=0) particles.splice(i,1);
});

requestAnimationFrame(animate);
}

setInterval(firework,1200);
animate();

</script></body>
</html>
